<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="main.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
    <h1></h1>
    <div class="container">
        <div class="guess-game">
            <div class="inputs"></div>
            <div class="buttons">
                <button class="check">Ckeck Word</button>
                <button class="hints"></button>
            </div>
            <div class="massage"></div>
        </div>
        <div class="guess-rouls">
            <h1>Game Rouls</h1>
            <div class="key">
                <div class="key-color orange"></div>
                <div class="key-text">Correct And In Right Place</div>
            </div>
            <div class="key">
                <div class="key-color green"></div>
                <div class="key-text">Correct And In Wronge Place</div>
            </div>
            <div class="key">
                <div class="key-color black"></div>
                <div class="key-text">Wronge</div>
            </div>
        </div>
        
    </div>
    <footer></footer>
    <script src="main.js"></script>

</html>
